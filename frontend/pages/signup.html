<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Gurukrupa Krushi Kendra</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .auth-container {
            min-height: calc(100vh - 80px);
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--bg-light);
            padding: 40px 20px;
        }
        .auth-card {
            background: #fff;
            padding: 40px;
            border-radius: 10px;
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 500px;
        }
        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .auth-header i {
            font-size: 3rem;
            color: var(--primary-color);
            margin-bottom: 10px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }
        .form-control {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            font-size: 1rem;
        }
        .form-control:focus {
            outline: none;
            border-color: var(--primary-color);
        }
        .btn-block {
            width: 100%;
            margin-top: 10px;
        }
        .auth-links {
            margin-top: 20px;
            text-align: center;
        }
        .auth-links a {
            color: var(--primary-color);
            font-weight: 500;
        }
        #error-msg {
            color: var(--danger-color);
            text-align: center;
            margin-bottom: 15px;
            display: none;
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <header class="navbar">
        <div class="container nav-container">
            <div class="logo">
                <a href="../index.html" style="display:flex; align-items:center; gap:10px;">
                    <i class="fa-solid fa-leaf text-primary"></i>
                    <h1>Gurukrupa Krushi Kendra</h1>
                </a>
            </div>
        </div>
    </header>

    <div class="auth-container" style="padding: 60px 20px;">
        <div class="auth-card" style="max-width: 600px;">
            <div class="auth-header">
                <i class="fa-solid fa-user-plus"></i>
                <h2 id="signup-title">Create Account</h2>
                <p id="signup-subtitle">Join the local agricultural marketplace</p>
            </div>
            <div id="error-msg" class="error-box" style="color: var(--danger-color); text-align: center; margin-bottom: 15px; display: none;"></div>
            
            <form id="signup-form">
                <div style="display: flex; gap: 15px; margin-bottom: 20px; background: #f0f2f5; padding: 5px; border-radius: 8px;">
                    <button type="button" id="role-farmer" class="btn" style="flex: 1; background: var(--primary-color); color: #fff; border-radius: 6px;">Farmer</button>
                    <button type="button" id="role-admin" class="btn" style="flex: 1; background: transparent; color: #555; border-radius: 6px;">Shop Owner</button>
                    <input type="hidden" id="role" value="farmer">
                </div>

                <div class="form-group" id="shop-name-group" style="display: none;">
                    <label for="shopName">Shop Name <span style="color:red;">*</span></label>
                    <input type="text" id="shopName" class="form-control" placeholder="e.g. Ramesh Krushi Kendra">
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div class="form-group">
                        <label for="name">Full Name</label>
                        <input type="text" id="name" class="form-control" placeholder="Your name" required>
                    </div>
                    <div class="form-group">
                        <label for="mobile">Mobile Number</label>
                        <input type="text" id="mobile" class="form-control" placeholder="10-digit number" required pattern="\d{10}">
                    </div>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div class="form-group">
                        <label for="state">State</label>
                        <input type="text" id="state" class="form-control" placeholder="e.g. Maharashtra" required>
                    </div>
                    <div class="form-group">
                        <label for="district">District</label>
                        <input type="text" id="district" class="form-control" placeholder="e.g. Pune" required>
                    </div>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div class="form-group">
                        <label for="taluka">Taluka</label>
                        <input type="text" id="taluka" class="form-control" placeholder="e.g. Haveli" required>
                    </div>
                    <div class="form-group">
                        <label for="town">Town / City <span style="color:red;">*</span></label>
                        <input type="text" id="town" class="form-control" placeholder="e.g. Manchar" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="village">Village / Landmark (Optional)</label>
                    <input type="text" id="village" class="form-control" placeholder="Nearby area">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="Create password (min 6 chars)" required minlength="6">
                </div>

                <button type="submit" class="btn btn-primary btn-block" id="signup-btn" style="padding: 15px;">Register & Start Browsing</button>
            </form>

            <div class="auth-links">
                <p>Already have an account? <a href="login.html">Login Here</a></p>
            </div>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
</body>
</html>
