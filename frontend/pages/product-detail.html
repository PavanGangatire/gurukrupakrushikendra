<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details - Gurukrupa Krushi Kendra</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .breadcrumb { margin: 20px 0; color: #888; font-size: 0.9rem; }
        .breadcrumb a { color: var(--primary-color); text-decoration: none; }
        .product-detail-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 50px;
            margin: 20px 0 60px 0;
            background: #fff;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        .product-gallery { position: sticky; top: 100px; }
        .main-img { 
            width: 100%; 
            aspect-ratio: 1; 
            object-fit: contain; 
            border-radius: 10px; 
            background: #f8f9fa;
            border: 1px solid #eee;
        }
        .product-meta { display: flex; flex-direction: column; }
        .brand-name { color: #007185; font-weight: 600; font-size: 1.1rem; margin-bottom: 5px; }
        .product-title { font-size: 2.2rem; line-height: 1.2; margin-bottom: 10px; color: #111; }
        .price-tag { font-size: 1.8rem; color: #B12704; font-weight: 500; margin: 15px 0; border-top: 1px solid #eee; border-bottom: 1px solid #eee; padding: 15px 0; }
        .price-symbol { font-size: 1.2rem; vertical-align: top; margin-top: 5px; display: inline-block; }
        .stock-status { font-weight: 700; margin-bottom: 20px; font-size: 1.1rem; }
        .description-box { line-height: 1.6; color: #333; margin-bottom: 30px; font-size: 1.05rem; }
        .purchase-box {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 20px;
            max-width: 300px;
        }
        .qty-selector { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
        .qty-input { width: 60px; padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
        
        @media (max-width: 992px) {
            .product-detail-layout { grid-template-columns: 1fr; gap: 30px; padding: 20px; }
        }
    </style>
</head>
<body>
    <header class="navbar">
        <div class="container nav-container">
            <div class="logo">
                <a href="../index.html" style="display:flex; align-items:center; gap:10px;">
                    <i class="fa-solid fa-leaf text-primary"></i>
                    <h1>Gurukrupa Krushi Kendra</h1>
                </a>
            </div>
            <div class="nav-actions"></div>
        </div>
    </header>

    <div class="container">
        <div id="product-detail-content">
            <div style="text-align:center; padding: 100px;"><i class="fa-solid fa-spinner fa-spin fa-3x text-primary"></i><p style="margin-top:20px; color:#666;">Loading exceptional product details...</p></div>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/cart.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            let productId = urlParams.get('id');
            if(!productId || productId === 'undefined' || productId === 'null') {
                productId = localStorage.getItem('selectedProductId');
            }
            const contentDiv = document.getElementById('product-detail-content');

            if (!productId || productId === 'undefined' || productId === 'null') {
                contentDiv.innerHTML = `
                    <div style="text-align:center; padding:80px 20px;">
                        <i class="fa-solid fa-search fa-4x" style="color:#ddd; margin-bottom:20px;"></i>
                        <h2 style="color:#333;">Product selection lost</h2>
                        <p style="color:#666; max-width:500px; margin:15px auto;">Your browser session may have timed out or the product list needs to be updated.</p>
                        <a href="products.html" class="btn btn-primary">Refresh Shop Catalog</a>
                    </div>
                `;
                return;
            }

            try {
                const response = await productAPI.getById(productId);
                
                if (!response || !response.success || !response.data) {
                    throw new Error('This product ID seems to be from an older version of the shop. Please refresh the shop page.');
                }

                const product = response.data;
                
                contentDiv.innerHTML = `
                    <div class="breadcrumb">
                        <a href="products.html">Shop</a> &nbsp; > &nbsp; 
                        <a href="products.html?category=${product.category}">${product.category}</a> &nbsp; > &nbsp; 
                        <span>${product.name.split(' - ')[0]}</span>
                    </div>

                    <div class="product-detail-layout">
                        <div class="product-gallery">
                            <img src="${product.image}" alt="${product.name}" class="main-img" onerror="this.src='../assets/placeholder.png'">
                        </div>
                        
                        <div class="product-meta">
                            <div class="brand-name">Visit the ${product.company} Store</div>
                            <h1 class="product-title">${product.name}</h1>
                            
                            <div class="price-tag">
                                <span class="price-symbol">₹</span>${product.price}
                                <span style="font-size:0.9rem; color:#555; font-weight:400;">(Incl. of all taxes)</span>
                            </div>

                            <div class="stock-status ${product.stock > 0 ? 'text-primary' : 'text-danger'}">
                                ${product.stock > 0 ? 'In Stock' : 'Currently Unavailable'}
                            </div>

                            <div class="description-box">
                                <h3 style="margin-bottom:10px; font-size:1.1rem; border-bottom:1px solid #eee; padding-bottom:5px;">About this item</h3>
                                ${product.description}
                            </div>

                            <div class="purchase-box">
                                <div style="font-size:1.4rem; color:#B12704; font-weight:700; margin-bottom:15px;">₹${product.price}</div>
                                <p style="font-size:0.9rem; color:#555; margin-bottom:15px;">FREE delivery on eligible orders.</p>
                                
                                <div class="qty-selector">
                                    <label for="qty">Quantity:</label>
                                    <select id="qty" class="qty-input">
                                        ${Array.from({length: Math.min(10, product.stock || 0)}, (_, i) => `<option value="${i+1}">${i+1}</option>`).join('')}
                                    </select>
                                </div>

                                <button class="btn btn-primary" id="add-to-cart-btn" style="width:100%; border-radius:20px; padding:12px; font-weight:700; margin-bottom:10px;" ${product.stock === 0 ? 'disabled' : ''}>
                                    Add to Cart
                                </button>
                                <a href="products.html" class="btn btn-outline" style="width:100%; border-radius:20px; padding:10px; text-decoration:none; text-align:center; display:block;">Back to List</a>
                            </div>
                        </div>
                    </div>

                    <div style="margin-top:40px; border-top:1px solid #eee; padding-top:20px;">
                        <h3 style="margin-bottom:20px;">Product Specifications</h3>
                        <table style="width:100%; max-width:600px; border-collapse: collapse;">
                            <tr><td style="padding:10px; border:1px solid #eee; background:#f9f9f9; width:200px; font-weight:600;">Manufacturer</td><td style="padding:10px; border:1px solid #eee;">${product.company}</td></tr>
                            <tr><td style="padding:10px; border:1px solid #eee; background:#f9f9f9; font-weight:600;">Category</td><td style="padding:10px; border:1px solid #eee;">${product.category}</td></tr>
                            <tr><td style="padding:10px; border:1px solid #eee; background:#f9f9f9; font-weight:600;">Unit Size</td><td style="padding:10px; border:1px solid #eee;">${product.unit || 'Standard'}</td></tr>
                            <tr><td style="padding:10px; border:1px solid #eee; background:#f9f9f9; font-weight:600;">Status</td><td style="padding:10px; border:1px solid #eee;">${product.stock > 0 ? 'Ready to Ship' : 'Out of Stock'}</td></tr>
                        </table>
                    </div>
                `;

                document.getElementById('add-to-cart-btn').addEventListener('click', () => {
                    const qty = parseInt(document.getElementById('qty').value);
                    cartUtil.addItem(product._id, product.name, product.price, product.image, qty);
                });

            } catch (err) {
                contentDiv.innerHTML = `
                    <div style="text-align:center; padding:80px 20px;">
                        <i class="fa-solid fa-rotate-right fa-4x" style="color:var(--primary-color); margin-bottom:20px;"></i>
                        <h2 style="color:#d32f2f;">Sync Error: Product not found</h2>
                        <p style="color:#666; max-width:500px; margin:15px auto;">This product's security ID has expired because the shop catalog was recently updated.</p>
                        <div style="background:#fff3f3; padding:15px; border-radius:8px; display:inline-block; margin-bottom:20px; border:1px solid #fed7d7;">
                            <strong>Solution:</strong> Go back to the shop, refresh the page, and click the product again.
                        </div>
                        <br>
                        <a href="products.html" class="btn btn-primary" style="padding: 12px 30px;">Go Back & Refresh Shop</a>
                    </div>
                `;
            }
        });
    </script>
</body>
</html>
